<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>MONTRA Admin · Coach Verification</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: '#E85D04' }, fontFamily: { sans: ['Inter','sans-serif'] } } } }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* iOS-style toggle */
    .tgl { width: 44px; height: 26px; border-radius: 9999px; background: #d1d5db; position: relative; transition: background .15s; cursor: pointer; flex-shrink: 0; }
    .tgl[data-on="true"] { background: #16a34a; }
    .tgl::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 9999px; background: #fff; transition: transform .15s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
    .tgl[data-on="true"]::after { transform: translateX(18px); }
    .tgl[aria-disabled="true"] { opacity: .5; pointer-events: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen">

  <header class="bg-black text-white">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-brand font-black text-lg">MONTRA</span>
        <span class="text-gray-400 text-sm">Admin · Coach Verification</span>
      </div>
      <button id="signout-btn" class="hidden text-xs font-semibold text-gray-300 hover:text-white">Sign out</button>
    </div>
  </header>

  <!-- LOGIN -->
  <div id="login-card" class="max-w-md mx-auto mt-16 bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">
    <h1 class="text-xl font-black mb-1">Admin sign-in</h1>
    <p class="text-sm text-gray-500 mb-6">Use your MONTRA admin account. Only admins can change verification flags.</p>
    <label class="block text-xs font-bold uppercase tracking-wide text-gray-500 mb-1">Email</label>
    <input id="email" type="email" autocomplete="username" class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm mb-3 outline-none focus:border-brand" placeholder="admin@example.com"/>
    <label class="block text-xs font-bold uppercase tracking-wide text-gray-500 mb-1">Password</label>
    <input id="password" type="password" autocomplete="current-password" class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm mb-4 outline-none focus:border-brand" placeholder="••••••••"/>
    <button id="login-btn" class="w-full bg-brand hover:bg-orange-700 text-white py-2.5 rounded-xl text-sm font-bold transition-colors">Sign in</button>
    <p id="login-error" class="text-sm text-red-600 mt-3"></p>
  </div>

  <!-- DASHBOARD -->
  <main id="dashboard" class="hidden max-w-5xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
      <div>
        <h1 class="text-2xl font-black">Coach Verification</h1>
        <p class="text-sm text-gray-500">Toggle a badge only after the real check actually clears. Each toggle saves immediately.</p>
      </div>
      <div class="flex items-center gap-2">
        <input id="search" type="text" placeholder="Search coaches…" class="border border-gray-300 rounded-xl px-3 py-2 text-sm outline-none focus:border-brand"/>
        <button id="refresh-btn" class="border border-gray-300 rounded-xl px-3 py-2 text-sm font-semibold hover:bg-gray-100">Refresh</button>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-5 text-xs font-semibold text-gray-500">
      <div class="bg-white border border-gray-200 rounded-xl px-4 py-3"><span id="stat-total" class="block text-xl font-black text-gray-900">—</span>Coaches</div>
      <div class="bg-white border border-gray-200 rounded-xl px-4 py-3"><span id="stat-verified" class="block text-xl font-black text-green-600">—</span>Fully verified</div>
      <div class="bg-white border border-gray-200 rounded-xl px-4 py-3"><span id="stat-pending" class="block text-xl font-black text-brand">—</span>Missing a badge</div>
    </div>

    <div id="loading" class="text-center text-gray-400 py-12 text-sm">Loading coaches…</div>
    <div id="trainer-list" class="space-y-3"></div>
    <p id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm font-semibold px-4 py-2.5 rounded-xl shadow-lg"></p>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';

    const BACKEND_URL = 'https://montra-production.up.railway.app';
    const FLAGS = [
      { key: 'idVerified', label: 'ID Verified' },
      { key: 'backgroundCheckCleared', label: 'Background Checked' },
      { key: 'montraCertified', label: 'MONTRA Certified™' },
    ];
    let firebaseAuth = null;
    let idToken = '';
    let trainers = [];

    function esc(v) { return String(v ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[c])); }
    function toast(msg, ok = true) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.remove('hidden');
      el.style.background = ok ? '#111827' : '#b91c1c';
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.add('hidden'), 2600);
    }

    async function initFirebase() {
      const res = await fetch(`${BACKEND_URL}/api/firebase/client-config`);
      const config = await res.json();
      const app = initializeApp(config, 'montra-admin');
      firebaseAuth = getAuth(app);
      onAuthStateChanged(firebaseAuth, async (user) => {
        if (user) {
          idToken = await user.getIdToken();
          showDashboard();
          loadTrainers();
        } else {
          document.getElementById('login-card').classList.remove('hidden');
          document.getElementById('dashboard').classList.add('hidden');
          document.getElementById('signout-btn').classList.add('hidden');
        }
      });
    }

    function showDashboard() {
      document.getElementById('login-card').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('signout-btn').classList.remove('hidden');
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');
      err.textContent = '';
      if (!email || !password) { err.textContent = 'Enter your email and password.'; return; }
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        await signInWithEmailAndPassword(firebaseAuth, email, password);
      } catch (e) {
        err.textContent = 'Sign-in failed. Check your credentials.';
      } finally {
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    }

    async function loadTrainers() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('trainer-list').innerHTML = '';
      try {
        const res = await fetch(`${BACKEND_URL}/api/admin/trainer-applications`, {
          headers: { Authorization: `Bearer ${idToken}` },
        });
        if (res.status === 403) { toast('This account is not an admin.', false); return; }
        if (!res.ok) throw new Error('load failed');
        const { applications } = await res.json();
        trainers = (applications || []).map((a) => a.trainer).filter(Boolean)
          .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        render();
      } catch (e) {
        toast('Could not load coaches.', false);
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    function render() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const list = trainers.filter((t) => !q || (t.name || '').toLowerCase().includes(q) || (t.email || '').toLowerCase().includes(q));

      document.getElementById('stat-total').textContent = trainers.length;
      const fully = trainers.filter((t) => FLAGS.every((f) => t[f.key])).length;
      document.getElementById('stat-verified').textContent = fully;
      document.getElementById('stat-pending').textContent = trainers.length - fully;

      document.getElementById('trainer-list').innerHTML = list.map((t) => {
        const statusColor = t.status === 'approved' ? 'text-green-600 bg-green-50' : t.status === 'pending' ? 'text-amber-600 bg-amber-50' : 'text-gray-500 bg-gray-100';
        const toggles = FLAGS.map((f) => `
          <div class="flex items-center gap-2.5">
            <div class="tgl" data-on="${!!t[f.key]}" data-id="${esc(t.id)}" data-flag="${f.key}" role="switch" aria-checked="${!!t[f.key]}" tabindex="0"></div>
            <span class="text-xs font-semibold text-gray-600">${f.label}</span>
          </div>`).join('');
        return `
          <div class="bg-white border border-gray-200 rounded-2xl p-4 flex flex-col sm:flex-row sm:items-center gap-4">
            <div class="flex items-center gap-3 min-w-0 sm:w-64">
              <div class="w-10 h-10 rounded-full bg-orange-50 text-brand font-black flex items-center justify-center flex-shrink-0">${esc(t.initials || (t.name || '?').slice(0,2).toUpperCase())}</div>
              <div class="min-w-0">
                <p class="font-bold text-sm truncate">${esc(t.name || 'Unnamed coach')}</p>
                <p class="text-xs text-gray-400 truncate">${esc(t.email || t.id)}</p>
              </div>
              <span class="ml-auto text-[10px] font-bold uppercase px-2 py-0.5 rounded-full ${statusColor}">${esc(t.status)}</span>
            </div>
            <div class="flex flex-wrap gap-x-6 gap-y-3 sm:ml-auto">${toggles}</div>
          </div>`;
      }).join('') || '<p class="text-center text-gray-400 py-12 text-sm">No coaches match your search.</p>';
    }

    async function setFlag(id, flag, value, toggleEl) {
      toggleEl.setAttribute('aria-disabled', 'true');
      try {
        const res = await fetch(`${BACKEND_URL}/api/admin/trainers/${encodeURIComponent(id)}/verification`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${idToken}` },
          body: JSON.stringify({ [flag]: value }),
        });
        if (!res.ok) throw new Error('save failed');
        const { trainer } = await res.json();
        const idx = trainers.findIndex((t) => t.id === id);
        if (idx >= 0) trainers[idx] = trainer;
        toggleEl.setAttribute('data-on', String(!!trainer[flag]));
        toggleEl.setAttribute('aria-checked', String(!!trainer[flag]));
        render();
        toast(`${FLAGS.find((f) => f.key === flag).label} ${value ? 'enabled' : 'cleared'} for ${trainer.name}`);
      } catch (e) {
        toast('Could not save. Try again.', false);
        toggleEl.setAttribute('data-on', String(!value));
      } finally {
        toggleEl.removeAttribute('aria-disabled');
      }
    }

    // Event wiring
    document.getElementById('login-btn').addEventListener('click', login);
    document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
    document.getElementById('signout-btn').addEventListener('click', () => signOut(firebaseAuth));
    document.getElementById('refresh-btn').addEventListener('click', loadTrainers);
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('trainer-list').addEventListener('click', (e) => {
      const tgl = e.target.closest('.tgl');
      if (!tgl || tgl.getAttribute('aria-disabled') === 'true') return;
      const next = tgl.getAttribute('data-on') !== 'true';
      setFlag(tgl.getAttribute('data-id'), tgl.getAttribute('data-flag'), next, tgl);
    });

    initFirebase().catch(() => toast('Could not reach the backend.', false));
  </script>
</body>
</html>
