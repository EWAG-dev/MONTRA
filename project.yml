name: MONTRA
options:
  bundleIdPrefix: com.elitehomefitness
  deploymentTarget:
    iOS: "17.0"
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  stripe-ios-spm:
    url: https://github.com/stripe/stripe-ios-spm.git
    from: "23.0.0"
targets:
  MONTRA:
    type: application
    platform: iOS
    sources:
      - path: MONTRA
        excludes:
          - .git/**
    # Removed the malformed resources array. XcodeGen will automatically include 
    # your Assets and Plist because they live inside the "MONTRA" source path.
    info:
      path: MONTRA/Info.plist
      properties:
        CFBundleDisplayName: MONTRA
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: MontraLaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        MONTRA_API_BASE_URL: https://montra-production.up.railway.app
        NSCameraUsageDescription: MONTRA uses the camera so you can take profile photos and share workout check-ins with your trainer.
        UIBackgroundModes: [remote-notification]
    entitlements:
      path: MONTRA/MONTRA.entitlements
      properties:
        com.apple.developer.aps-environment: production
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseMessaging
      - package: stripe-ios-spm
        product: StripePaymentSheet
    settings:
      base:
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "6"
        PRODUCT_BUNDLE_IDENTIFIER: com.elitehomefitness.montra
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES:
          - AppIconDark
          - AppIconLight
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: X29HP9D526

  MONTRATests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MONTRATests
    dependencies:
      - target: MONTRA
    settings:
      base:
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MONTRA.app/MONTRA"
        BUNDLE_LOADER: "$(TEST_HOST)"