name: MONTRA
options:
  bundleIdPrefix: com.elitehomefitness
  deploymentTarget:
    iOS: "17.0"
packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
targets:
  MONTRA:
    type: application
    platform: iOS
    sources:
      - path: MONTRA
        excludes:
          - .git/**
    # Removed the malformed resources array. XcodeGen will automatically include 
    # your Assets and Plist because they live inside the "MONTRA" source path.
    info:
      path: MONTRA/Info.plist
      properties:
        CFBundleDisplayName: MONTRA
        CFBundleVersion: "4"
        UILaunchScreen:
          UIColorName: MontraLaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        MONTRA_API_BASE_URL: https://montra-production.up.railway.app
        UIBackgroundModes: [remote-notification]
    entitlements:
      path: MONTRA/MONTRA.entitlements
      properties:
        com.apple.developer.aps-environment: development
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseMessaging
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elitehomefitness.montra
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES:
          - AppIconDark
          - AppIconLight
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: X29HP9D526